<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Patient - Patient Information System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex">

  <div id="sidebar"></div>

  <main class="flex-1 ml-56 p-8">

    <!-- Top bar -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <a href="index.html" class="text-gray-400 hover:text-gray-600 text-sm">← Back</a>
        <h2 class="text-xl font-semibold text-gray-800">Patient Details</h2>
      </div>
      <button id="edit-btn" onclick="goToEdit()"
        class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition"
      >
        Edit Patient
      </button>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-gray-400 text-sm">Loading patient details...</div>

    <!-- Content -->
    <div id="content" class="hidden max-w-2xl">

      <!-- Personal Info Card -->
      <div class="bg-white rounded-xl shadow-sm p-6 mb-4">
        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-4">Personal Information</h3>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <p class="text-xs text-gray-400 mb-1">Full Name</p>
            <p id="name" class="text-sm font-medium text-gray-800"></p>
          </div>
          <div>
            <p class="text-xs text-gray-400 mb-1">Birthdate</p>
            <p id="birthdate" class="text-sm text-gray-700"></p>
          </div>
          <div>
            <p class="text-xs text-gray-400 mb-1">Contact Number</p>
            <p id="contact" class="text-sm text-gray-700"></p>
          </div>
          <div>
            <p class="text-xs text-gray-400 mb-1">Address</p>
            <p id="address" class="text-sm text-gray-700"></p>
          </div>
        </div>
      </div>

      <!-- Medical Info Card -->
      <div class="bg-white rounded-xl shadow-sm p-6">
        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-4">Medical Information</h3>
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <p class="text-xs text-gray-400 mb-1">Blood Type</p>
            <p id="blood_type" class="text-sm text-gray-700"></p>
          </div>
          <div>
            <p class="text-xs text-gray-400 mb-1">Doctor</p>
            <p id="doctor" class="text-sm text-gray-700"></p>
          </div>
          <div>
            <p class="text-xs text-gray-400 mb-1">Allergies</p>
            <p id="allergies" class="text-sm text-gray-700"></p>
          </div>
          <div>
            <p class="text-xs text-gray-400 mb-1">Medicines</p>
            <p id="medicines" class="text-sm text-gray-700"></p>
          </div>
        </div>
        <div>
          <p class="text-xs text-gray-400 mb-1">Medical History</p>
          <p id="medical_history" class="text-sm text-gray-700"></p>
        </div>
      </div>

    </div>

  </main>

  <script src="js/app.js"></script>
  <script src="components/sidebar.js"></script>
  <script src="js/view.js"></script>

</body>
</html>
