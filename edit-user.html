<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit User - Patient Information System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex">

  <div id="sidebar"></div>

  <main class="flex-1 ml-56 p-8">

    <!-- Top bar -->
    <div class="flex items-center gap-3 mb-6">
      <a href="users.html" class="text-gray-400 hover:text-gray-600 text-sm">← Back</a>
      <h2 class="text-xl font-semibold text-gray-800">Edit User</h2>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-6 max-w-md">

      <!-- Messages -->
      <p id="error-msg"   class="text-red-500 text-sm mb-4 hidden"></p>
      <p id="success-msg" class="text-green-500 text-sm mb-4 hidden"></p>

      <!-- Username -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-600 mb-1">Username <span class="text-red-400">*</span></label>
        <input type="text" id="username" placeholder="Enter username"
          class="w-full border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- New Password -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-600 mb-1">New Password <span class="text-gray-400 font-normal">(leave blank to keep current)</span></label>
        <input type="password" id="password" placeholder="Enter new password"
          class="w-full border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Role -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-600 mb-1">Role <span class="text-red-400">*</span></label>
        <select id="role"
          class="w-full border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option value="">Select role</option>
          <option value="admin">Admin</option>
          <option value="staff">Staff</option>
          <option value="viewer">Viewer</option>
        </select>
      </div>

      <!-- Buttons -->
      <div class="flex gap-3">
        <button id="submit-btn" onclick="saveUser()"
          class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-6 py-2 rounded-lg transition"
        >
          Save Changes
        </button>
        <a href="users.html"
          class="bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-medium px-6 py-2 rounded-lg transition"
        >
          Cancel
        </a>
      </div>

    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="components/sidebar.js"></script>
  <script src="js/edit-user.js"></script>

</body>
</html>
