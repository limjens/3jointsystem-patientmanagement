<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patients - Patient Information System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex">

  <div id="sidebar"></div>

  <main class="flex-1 ml-56 p-8">

    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-semibold text-gray-800">Patients</h2>
      <a href="add.html" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">
        + Add Patient
      </a>
    </div>

    <div class="flex gap-3 mb-6">
      <input type="text" id="search" placeholder="Search by name..."
        class="border border-gray-200 rounded-lg px-4 py-2 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <select id="blood-filter"
        class="border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        <option value="">All Blood Types</option>
        <option>A+</option><option>A-</option>
        <option>B+</option><option>B-</option>
        <option>O+</option><option>O-</option>
        <option>AB+</option><option>AB-</option>
      </select>
    </div>

    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
          <tr>
            <th class="px-6 py-3 text-left">Name</th>
            <th class="px-6 py-3 text-left">Blood Type</th>
            <th class="px-6 py-3 text-left">Doctor</th>
            <th class="px-6 py-3 text-left">Allergies</th>
            <th class="px-6 py-3 text-left">Actions</th>
          </tr>
        </thead>
        <tbody id="patient-list">
          <tr>
            <td colspan="5" class="px-6 py-8 text-center text-gray-400">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>

  <script src="js/app.js"></script>
  <script src="components/sidebar.js"></script>
  <script src="js/index.js"></script>

</body>
</html>
