<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Information System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Patient Information System</h1>

  <a href="add.html">Add Patient</a>

  <input type="text" id="search" placeholder="Search by name..." oninput="searchPatients()">

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Blood Type</th>
        <th>Doctor</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="patient-list">
      <!-- filled by app.js -->
    </tbody>
  </table>

  <script src="app.js"></script>
  <script>
    let allPatients = []

    async function loadPatients() {
      const patients = await getAllPatients()
      allPatients = patients
      renderTable(patients)
    }

    async function renderTable(patients) {
      const tbody = document.getElementById('patient-list')
      tbody.innerHTML = ''

      for (const patient of patients) {
        const person = await getPerson(patient.person_id)
        const row = `
          <tr>
            <td>${person.name}</td>
            <td>${patient.blood_type || 'N/A'}</td>
            <td>${patient.doctor || 'N/A'}</td>
            <td>
              <button onclick="viewPatient(${patient.person_id})">View</button>
              <button onclick="deletePatientRecord(${patient.person_id})">Delete</button>
            </td>
          </tr>
        `
        tbody.innerHTML += row
      }
    }

    function searchPatients() {
      const query = document.getElementById('search').value.toLowerCase()
      const filtered = allPatients.filter(p => 
        p.name && p.name.toLowerCase().includes(query)
      )
      renderTable(filtered)
    }

    function viewPatient(person_id) {
      window.location.href = `view.html?id=${person_id}`
    }

    async function deletePatientRecord(person_id) {
      if (confirm('Are you sure you want to delete this patient?')) {
        await deletePatient(person_id)
        await deletePerson(person_id)
        loadPatients()
      }
    }

    loadPatients()
  </script>

</body>
</html>
